<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 680">
  <!-- DrawIO Style Grid Background -->
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">大模型 Function Call 工作流程</text>

  <!-- Flow diagram -->
  
  <!-- User -->
  <ellipse cx="450" cy="100" rx="80" ry="30" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="450" y="105" font-family="Arial" font-size="16" text-anchor="middle">用户</text>

  <!-- Query -->
  <path d="M 450 130 L 450 170" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10" stroke-dasharray="3 3"/>
  <polygon points="450,180 445,170 455,170" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <rect x="350" y="150" width="200" height="30" rx="5" ry="5" fill="none" stroke="none"/>
  <text x="450" y="170" font-family="Arial" font-size="14" text-anchor="middle">发送查询："查询最近的天气"</text>

  <!-- LLM -->
  <rect x="350" y="180" width="200" height="60" rx="10" ry="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="450" y="210" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">大模型</text>
  <text x="450" y="230" font-family="Arial" font-size="14" text-anchor="middle">(LLM)</text>

  <!-- Function determination -->
  <path d="M 450 240 L 450 280" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="450,290 445,280 455,280" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- Decision Diamond -->
  <polygon points="450,290 500,330 450,370 400,330" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="450" y="335" font-family="Arial" font-size="14" text-anchor="middle">需要调用函数?</text>
  
  <!-- No branch -->
  <path d="M 500 330 L 650 330" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="660,330 650,325 650,335" fill="#000000" stroke="#000000" stroke-width="2"/>
  <text x="580" y="320" font-family="Arial" font-size="14" text-anchor="middle">否</text>
  
  <!-- Direct response -->
  <rect x="660" y="300" width="180" height="60" rx="10" ry="10" fill="#f5f5f5" stroke="#666666" stroke-width="2"/>
  <text x="750" y="335" font-family="Arial" font-size="14" text-anchor="middle">直接生成文本响应</text>
  
  <!-- Yes branch -->
  <path d="M 450 370 L 450 410" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="450,420 445,410 455,410" fill="#000000" stroke="#000000" stroke-width="2"/>
  <text x="470" y="400" font-family="Arial" font-size="14" text-anchor="start">是</text>
  
  <!-- Function selection -->
  <rect x="350" y="420" width="200" height="60" rx="10" ry="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="450" y="445" font-family="Arial" font-size="14" text-anchor="middle">确定调用哪个函数</text>
  <text x="450" y="465" font-family="Arial" font-size="14" text-anchor="middle">及其参数</text>

  <!-- JSON Output -->
  <path d="M 450 480 L 450 520" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="450,530 445,520 455,520" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- JSON Example -->
  <rect x="300" y="530" width="300" height="130" rx="5" ry="5" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="320" y="550" font-family="Courier New" font-size="14" font-weight="bold">JSON格式的函数调用：</text>
  <text x="320" y="570" font-family="Courier New" font-size="12">{</text>
  <text x="330" y="590" font-family="Courier New" font-size="12">"name": "get_weather",</text>
  <text x="330" y="610" font-family="Courier New" font-size="12">"parameters": {</text>
  <text x="340" y="630" font-family="Courier New" font-size="12">"location": "北京",</text>
  <text x="340" y="650" font-family="Courier New" font-size="12">"unit": "celsius"</text>
  <text x="330" y="670" font-family="Courier New" font-size="12">}</text>
  <text x="320" y="690" font-family="Courier New" font-size="12">}</text>
  
  <!-- External system arrow -->
  <path d="M 600 595 L 680 595" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="690,595 680,590 680,600" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- External API box -->
  <rect x="690" y="565" width="170" height="60" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="775" y="595" font-family="Arial" font-size="14" text-anchor="middle">外部API/服务</text>
  <text x="775" y="615" font-family="Arial" font-size="12" text-anchor="middle">(天气服务)</text>
  
  <!-- API response arrow -->
  <path d="M 690 540 L 610 540" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="600,540 610,535 610,545" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- API response box -->
  <rect x="690" y="510" width="170" height="60" rx="10" ry="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="775" y="540" font-family="Arial" font-size="14" text-anchor="middle">API响应结果</text>
  <text x="775" y="560" font-family="Arial" font-size="12" text-anchor="middle">(温度、天气状况等)</text>
  
  <!-- Back to LLM arrow -->
  <path d="M 300 595 L 250 595 L 250 210 L 340 210" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10" stroke-dasharray="3 3"/>
  <polygon points="350,210 340,205 340,215" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- Final response arrow -->
  <path d="M 750 300 L 750 150 L 530 150" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="520,150 530,145 530,155" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- Legend -->
  <rect x="60" y="480" width="200" height="130" fill="#f5f5f5" stroke="#666666" stroke-width="1" rx="5" ry="5"/>
  <text x="160" y="500" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">图例</text>
  
  <rect x="70" y="515" width="20" height="20" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="100" y="530" font-family="Arial" font-size="12" text-anchor="start">用户</text>
  
  <rect x="70" y="545" width="20" height="20" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="100" y="560" font-family="Arial" font-size="12" text-anchor="start">大模型/系统处理</text>
  
  <rect x="70" y="575" width="20" height="20" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="100" y="590" font-family="Arial" font-size="12" text-anchor="start">决策点</text>
  
  <rect x="70" y="605" width="20" height="20" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="100" y="620" font-family="Arial" font-size="12" text-anchor="start">函数调用数据</text>
  
  <rect x="70" y="635" width="20" height="20" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="100" y="650" font-family="Arial" font-size="12" text-anchor="start">外部系统/API</text>
  
  <!-- Additional explanations -->
  <rect x="60" y="120" width="300" height="320" fill="#f5f5f5" stroke="#666666" stroke-width="1" rx="5" ry="5"/>
  <text x="210" y="140" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Function Call 关键步骤</text>
  
  <text x="80" y="170" font-family="Arial" font-size="14" font-weight="bold">1. 函数定义</text>
  <text x="90" y="190" font-family="Arial" font-size="12">在系统中预先定义可用的函数及其JSON</text>
  <text x="90" y="210" font-family="Arial" font-size="12">Schema（包含函数名、参数、描述等）</text>
  
  <text x="80" y="240" font-family="Arial" font-size="14" font-weight="bold">2. 函数判断</text>
  <text x="90" y="260" font-family="Arial" font-size="12">大模型根据用户输入决定是否需要</text>
  <text x="90" y="280" font-family="Arial" font-size="12">调用函数来响应查询</text>
  
  <text x="80" y="310" font-family="Arial" font-size="14" font-weight="bold">3. 函数调用</text>
  <text x="90" y="330" font-family="Arial" font-size="12">大模型生成标准格式的函数调用JSON</text>
  <text x="90" y="350" font-family="Arial" font-size="12">系统解析并执行对应的实际函数</text>
  
  <text x="80" y="380" font-family="Arial" font-size="14" font-weight="bold">4. 结果处理</text>
  <text x="90" y="400" font-family="Arial" font-size="12">系统将函数执行结果返回给大模型</text>
  <text x="90" y="420" font-family="Arial" font-size="12">大模型利用结果生成自然语言回复</text>
</svg>

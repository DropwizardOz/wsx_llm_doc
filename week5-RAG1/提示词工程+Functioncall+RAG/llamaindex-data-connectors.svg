<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f9f9f9"/>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">LlamaIndex 数据连接器架构</text>
  
  <!-- 数据源区域 -->
  <rect x="50" y="100" width="200" height="400" rx="10" ry="10" fill="#e6f2ff" stroke="#aac8e6" stroke-width="2"/>
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">数据源 (Data Sources)</text>
  
  <!-- 各类数据源图标和文字 -->
  <!-- 文件 -->
  <rect x="80" y="160" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#aac8e6" stroke-width="1"/>
  <text x="150" y="185" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">本地文件 (PDF, TXT)</text>
  
  <!-- 数据库 -->
  <rect x="80" y="220" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#aac8e6" stroke-width="1"/>
  <text x="150" y="245" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">数据库 (SQL, NoSQL)</text>
  
  <!-- API -->
  <rect x="80" y="280" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#aac8e6" stroke-width="1"/>
  <text x="150" y="305" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">API (REST, GraphQL)</text>
  
  <!-- 网页 -->
  <rect x="80" y="340" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#aac8e6" stroke-width="1"/>
  <text x="150" y="365" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">网页 (HTML)</text>
  
  <!-- 其他 -->
  <rect x="80" y="400" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#aac8e6" stroke-width="1"/>
  <text x="150" y="425" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">其他 (CSV, JSON)</text>
  
  <!-- LlamaIndex数据连接器区域 -->
  <rect x="320" y="100" width="200" height="400" rx="10" ry="10" fill="#f0ebfa" stroke="#d0c0e8" stroke-width="2"/>
  <text x="420" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">数据连接器 (Connectors)</text>
  
  <!-- 各类连接器 -->
  <rect x="350" y="160" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#d0c0e8" stroke-width="1"/>
  <text x="420" y="185" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">SimpleDirectoryReader</text>
  
  <rect x="350" y="220" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#d0c0e8" stroke-width="1"/>
  <text x="420" y="245" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">DatabaseReader</text>
  
  <rect x="350" y="280" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#d0c0e8" stroke-width="1"/>
  <text x="420" y="305" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">APIReader</text>
  
  <rect x="350" y="340" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#d0c0e8" stroke-width="1"/>
  <text x="420" y="365" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">WebPageReader</text>
  
  <rect x="350" y="400" width="140" height="40" rx="5" ry="5" fill="#ffffff" stroke="#d0c0e8" stroke-width="1"/>
  <text x="420" y="425" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">CustomReader</text>
  
  <!-- LlamaIndex索引区域 -->
  <rect x="590" y="100" width="160" height="400" rx="10" ry="10" fill="#e6f5e9" stroke="#b8d8c0" stroke-width="2"/>
  <text x="670" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">索引 (Indexes)</text>
  
  <!-- 索引类型 -->
  <rect x="610" y="180" width="120" height="40" rx="5" ry="5" fill="#ffffff" stroke="#b8d8c0" stroke-width="1"/>
  <text x="670" y="205" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">VectorStoreIndex</text>
  
  <rect x="610" y="240" width="120" height="40" rx="5" ry="5" fill="#ffffff" stroke="#b8d8c0" stroke-width="1"/>
  <text x="670" y="265" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">ListIndex</text>
  
  <rect x="610" y="300" width="120" height="40" rx="5" ry="5" fill="#ffffff" stroke="#b8d8c0" stroke-width="1"/>
  <text x="670" y="325" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">KnowledgeGraph</text>
  
  <rect x="610" y="360" width="120" height="40" rx="5" ry="5" fill="#ffffff" stroke="#b8d8c0" stroke-width="1"/>
  <text x="670" y="385" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">SummaryIndex</text>
  
  <!-- 连接线 -->
  <!-- 数据源到连接器 -->
  <path d="M250 180 L350 180" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M250 240 L350 240" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M250 300 L350 300" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M250 360 L350 360" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M250 420 L350 420" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 连接器到索引 -->
  <path d="M490 200 C540 200, 540 200, 610 200" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M490 260 C540 260, 540 260, 610 260" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M490 320 C540 320, 540 320, 610 320" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M490 380 C540 380, 540 380, 610 380" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 底部说明 -->
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">数据流向: 数据源 → 连接器 → 索引 → 查询引擎</text>
  <text x="400" y="570" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">连接器负责从不同来源提取、加载和转换数据为Documents对象</text>
</svg>

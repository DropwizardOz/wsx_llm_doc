<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- 背景 -->
  <rect width="1000" height="700" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">LlamaIndex 全功能架构</text>
  
  <!-- 数据源层 -->
  <rect x="50" y="80" width="900" height="100" rx="10" ry="10" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="500" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">数据源 (Data Sources)</text>
  
  <!-- 数据源图标 -->
  <rect x="80" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="130" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">PDF/文档</text>
  
  <rect x="200" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="250" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">数据库</text>
  
  <rect x="320" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="370" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">API</text>
  
  <rect x="440" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="490" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">网页</text>
  
  <rect x="560" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="610" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">音频/视频</text>
  
  <rect x="680" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="730" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">知识库</text>
  
  <rect x="800" y="130" width="100" height="30" rx="5" ry="5" fill="#fff" stroke="#1890ff" stroke-width="1"/>
  <text x="850" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">自定义源</text>
  
  <!-- 数据连接器层 -->
  <rect x="50" y="200" width="900" height="80" rx="10" ry="10" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="500" y="230" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">数据连接器 (Data Connectors)</text>
  
  <!-- 连接器图标 -->
  <rect x="100" y="250" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#52c41a" stroke-width="1"/>
  <text x="160" y="267" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SimpleDirectoryReader</text>
  
  <rect x="240" y="250" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#52c41a" stroke-width="1"/>
  <text x="300" y="267" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">DatabaseReader</text>
  
  <rect x="380" y="250" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#52c41a" stroke-width="1"/>
  <text x="440" y="267" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">APIReader</text>
  
  <rect x="520" y="250" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#52c41a" stroke-width="1"/>
  <text x="580" y="267" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">WebPageReader</text>
  
  <rect x="660" y="250" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#52c41a" stroke-width="1"/>
  <text x="720" y="267" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">AudioTranscriber</text>
  
  <rect x="800" y="250" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#52c41a" stroke-width="1"/>
  <text x="860" y="267" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">CustomReader</text>
  
  <!-- 文档处理层 -->
  <rect x="50" y="300" width="900" height="80" rx="10" ry="10" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="500" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">文档处理 (Document Processing)</text>
  
  <!-- 文档处理图标 -->
  <rect x="100" y="350" width="170" height="25" rx="5" ry="5" fill="#fff" stroke="#fa8c16" stroke-width="1"/>
  <text x="185" y="367" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">TextSplitter (Node Parser)</text>
  
  <rect x="290" y="350" width="170" height="25" rx="5" ry="5" fill="#fff" stroke="#fa8c16" stroke-width="1"/>
  <text x="375" y="367" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Embeddings (OpenAI, HF等)</text>
  
  <rect x="480" y="350" width="170" height="25" rx="5" ry="5" fill="#fff" stroke="#fa8c16" stroke-width="1"/>
  <text x="565" y="367" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Transformations (链接等)</text>
  
  <rect x="670" y="350" width="170" height="25" rx="5" ry="5" fill="#fff" stroke="#fa8c16" stroke-width="1"/>
  <text x="755" y="367" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Metadata Extractors</text>
  
  <!-- 索引层 -->
  <rect x="50" y="400" width="900" height="80" rx="10" ry="10" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="500" y="430" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">索引 (Indexes)</text>
  
  <!-- 索引图标 -->
  <rect x="80" y="450" width="140" height="25" rx="5" ry="5" fill="#fff" stroke="#722ed1" stroke-width="1"/>
  <text x="150" y="467" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">VectorStoreIndex</text>
  
  <rect x="230" y="450" width="140" height="25" rx="5" ry="5" fill="#fff" stroke="#722ed1" stroke-width="1"/>
  <text x="300" y="467" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SummaryIndex</text>
  
  <rect x="380" y="450" width="140" height="25" rx="5" ry="5" fill="#fff" stroke="#722ed1" stroke-width="1"/>
  <text x="450" y="467" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">KnowledgeGraphIndex</text>
  
  <rect x="530" y="450" width="140" height="25" rx="5" ry="5" fill="#fff" stroke="#722ed1" stroke-width="1"/>
  <text x="600" y="467" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">DocumentSummaryIndex</text>
  
  <rect x="680" y="450" width="140" height="25" rx="5" ry="5" fill="#fff" stroke="#722ed1" stroke-width="1"/>
  <text x="750" y="467" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">TreeIndex</text>
  
  <rect x="830" y="450" width="90" height="25" rx="5" ry="5" fill="#fff" stroke="#722ed1" stroke-width="1"/>
  <text x="875" y="467" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">多模态索引</text>
  
  <!-- 存储层 -->
  <rect x="50" y="500" width="900" height="80" rx="10" ry="10" fill="#fcffe6" stroke="#7cb305" stroke-width="2"/>
  <text x="500" y="530" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">存储 (Storage)</text>
  
  <!-- 存储图标 -->
  <rect x="80" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="130" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SimpleStorage</text>
  
  <rect x="200" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="250" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Redis</text>
  
  <rect x="320" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="370" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Pinecone</text>
  
  <rect x="440" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="490" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Chroma</text>
  
  <rect x="560" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="610" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">FAISS</text>
  
  <rect x="680" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="730" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Weaviate</text>
  
  <rect x="800" y="550" width="100" height="25" rx="5" ry="5" fill="#fff" stroke="#7cb305" stroke-width="1"/>
  <text x="850" y="567" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">MongoDB</text>
  
  <!-- 查询引擎层 -->
  <rect x="50" y="600" width="430" height="80" rx="10" ry="10" fill="#e6fffb" stroke="#13c2c2" stroke-width="2"/>
  <text x="265" y="630" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">查询引擎 (Query Engines)</text>
  
  <!-- 查询引擎图标 -->
  <rect x="70" y="650" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#13c2c2" stroke-width="1"/>
  <text x="130" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">VectorQueryEngine</text>
  
  <rect x="200" y="650" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#13c2c2" stroke-width="1"/>
  <text x="260" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">RouterQueryEngine</text>
  
  <rect x="330" y="650" width="120" height="25" rx="5" ry="5" fill="#fff" stroke="#13c2c2" stroke-width="1"/>
  <text x="390" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SubQuestionEngine</text>
  
  <!-- LLM层 -->
  <rect x="520" y="600" width="430" height="80" rx="10" ry="10" fill="#fff1f0" stroke="#f5222d" stroke-width="2"/>
  <text x="735" y="630" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">LLM 模型</text>
  
  <!-- LLM图标 -->
  <rect x="540" y="650" width="90" height="25" rx="5" ry="5" fill="#fff" stroke="#f5222d" stroke-width="1"/>
  <text x="585" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OpenAI</text>
  
  <rect x="640" y="650" width="90" height="25" rx="5" ry="5" fill="#fff" stroke="#f5222d" stroke-width="1"/>
  <text x="685" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Anthropic</text>
  
  <rect x="740" y="650" width="90" height="25" rx="5" ry="5" fill="#fff" stroke="#f5222d" stroke-width="1"/>
  <text x="785" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">HuggingFace</text>
  
  <rect x="840" y="650" width="90" height="25" rx="5" ry="5" fill="#fff" stroke="#f5222d" stroke-width="1"/>
  <text x="885" y="667" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">自定义LLM</text>
  
  <!-- 连接线和箭头 -->
  <!-- 数据源 → 连接器 -->
  <path d="M500 180 L500 200" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 连接器 → 文档处理 -->
  <path d="M500 280 L500 300" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 文档处理 → 索引 -->
  <path d="M500 380 L500 400" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 索引 → 存储 -->
  <path d="M500 480 L500 500" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 存储 → 查询引擎/LLM -->
  <path d="M500 580 L350 600" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M500 580 L650 600" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- LlamaIndex Logo -->
  <rect x="900" y="10" width="40" height="40" rx="5" ry="5" fill="#000"/>
  <path d="M920 15 C930 12, 930 20, 925 25 C935 28, 940 15, 925 10 C915 8, 910 10, 920 15" fill="#ff99cc" stroke="none"/>
  <path d="M915 25 C910 30, 905 40, 910 45 C918 50, 930 50, 935 40 C938 30, 930 25, 925 22 C920 20, 915 20, 915 25" fill="#99ccff" stroke="none"/>
</svg>
